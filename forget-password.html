<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="forgot-password-section">
        <div class="container">
            <div class="section-main-wrapper">
                <h1 class="title">Forgot Password</h1>
                <p class="form-description">Enter your email address and we'll send you a link to reset your password.</p>

                <form class="form-spacing forgot-password-form">
                    <div class="forgot-password-input-group">
                        <label class="forgot-password-input-label" for="forgot-email">Email Address</label>
                        <input class="content-inpute" type="email" id="forgot-email" placeholder="name@company.com" required>
                    </div>
                    <button class="btn primary-btn" type="submit">Send Reset Link</button>
                    <a href="sign-in.html" class="primary-link align-center">Back to Sign In</a>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
