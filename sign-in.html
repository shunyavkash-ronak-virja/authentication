<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="sign-in-section">
        <div class="container">
            <div class="section-main-wrapper">
                <h1 class="title">Sign In</h1>
                <p class="form-description">We are excited to have your back. Log in now and access your account.</p>

                <form class="form-spacing sign-in-form">
                    <div class="sign-in-input-group">
                        <label class="sign-in-input-label" for="sign-in-email">Email Address</label>
                        <input class="content-inpute sign-in-input" type="email" id="sign-in-email" placeholder="name@company.com" required>
                    </div>
                    <div class="sign-in-input-group">
                        <div class="sign-in-pass-label-wrapper">
                            <label class="sign-in-input-label" for="sign-in-pass">Password</label>
                            <a class="primary-link forgot-password-link" href="forget-password.html">Forgot password?</a>
                        </div>
                        <input class="content-inpute sign-in-input" type="password" id="sign-in-pass" placeholder="••••••••" required>
                    </div>
                    <label class="sign-in-remember-label" for="remember-me-option">
                        <input type="checkbox" class="remember-checkbox" id="remember-me-option">
                        <span>Remember me for 1 days</span>
                    </label>
                    <button class="btn primary-btn">Sing in</button>
                    <div class="align-center">
                        <span class="font-vesper">Don't have an account?</span>
                        <a class="primary-link inline-flex" href="sign-up.html">Create one for free</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!----- Custom Js ----->
    <script src="assets/js/script.js"></script>
</body>

</html>
