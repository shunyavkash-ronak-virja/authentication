<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="sign-in-section">
        <div class="container">
            <div class="section-main-wrapper">
                <h1 class="title">Sign In</h1>
                <p class="form-description">We are excited to have your back. Log in now and access your account.</p>

                <form class="form-spacing sign-in-form" novalidate>
                    <div class="form-input-group">
                        <label class="text-capitalize sign-in-input-label" for="sign-in-email">Email Address</label>
                        <input class="content-inpute sign-in-input" type="email" id="sign-in-email" placeholder="name@company.com" required>
                    </div>
                    <div class="form-input-group">
                        <dKiv class="sign-in-pass-label-wrapper">
                            <label class="text-capitalize sign-in-input-label" for="sign-in-pass">Password</label>
                            <a class="primary-link forgot-password-link" href="forget-password.html">Forgot password?</a>
                        </dKiv>
                        <div class="password-input-wrapper">
                            <input class="content-inpute sign-in-input" type="password" id="sign-in-password" data-password-input placeholder="••••••••" required>
                            <div class="password-show-toggle" data-password-toggle>
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-show-icon eye-open-icon icon-visibility lucide lucide-eye-icon lucide-eye">
                                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-show-icon eye-close-icon lucide lucide lucide-eye-off-icon lucide-eye-off">
                                    <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
                                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                                    <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
                                    <path d="m2 2 20 20" />
                                </svg>
                            </div>
                        </div>
                    </div>
                    <label class="sign-in-remember-label" for="remember-me-option">
                        <input type="checkbox" class="remember-checkbox" id="remember-me-option" required>
                        <span>Remember me for 1 days</span>
                    </label>
                    <button class="btn primary-btn" type="submit">Sing in</button>
                    <div class="align-center">
                        <span class="font-vesper">Don't have an account?</span>
                        <a class="primary-link inline-flex" href="sign-up.html">Create one for free</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!----- Custom Js ----->
    <script src="assets/js/script.js"></script>
</body>

</html>
