<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>authentication</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="sign-in-section">
        <div class="container">
            <div class="sign-in-wrapper">
                <h1 class="sign-in-title">Sign In</h1>
                <p class="sign-in-description">We are excited to have your back. Log in now and access your account.</p>
                <form class="sign-in-form">
                    <div class="sign-in-input-wrapper">
                        <label class="sign-in-input-label" for="sign-in-email">Email Address</label>
                        <input class="sign-in-input" type="email" id="sign-in-email" placeholder="Enter your email" required>
                    </div>
                    <div class="sign-in-input-wrapper">
                        <div class="sign-in-pass-label-wrapper">
                            <label class="sign-in-input-label" for="sign-in-pass">Password</label>
                            <a href="javascript:void(0);" class="forgot-password-link">Forgot password?</a>
                        </div>
                        <input class="sign-in-input" type="password" id="sign-in-pass" placeholder="Enter your password" required>
                    </div>
                    <div class="sign-in-remember-wrapper">
                        <input type="checkbox">
                        <label for="">Remember me for 1 days</label>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!----- Custom Js ----->
    <script src="assets/js/script.js"></script>
</body>

</html>
