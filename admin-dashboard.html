<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="admin-dashboard-section">
        <div class="container lg-container">
            <div class="admin-dashboard-wrapper">
                <div class="dashboard-header">
                    <h1 class="dashboard-title">User Management</h1>
                    <button class="btn primary-btn dashboard-logout-btn" id="logout-btn" type="button">Logout</button>
                </div>

                <div class="dashboard-table-wrapper">
                    <table class="dashboard-user-table">
                        <thead class="dashboard-thead">
                            <tr class="dashboard-thead-row">
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th class="action-column">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="dashboard-table-body" id="user-table-body">
                        </tbody>
                    </table>
                    <template id="user-row-template">
                        <tr>
                            <td>
                                <div class="editable-field" data-field="fullName">
                                    <span class="field-text user-name-text"></span>
                                    <input type="text" class="content-inpute field-input user-name-input hidden">
                                    <div class="field-actions">
                                        <button class="dashboard-btn field-edit-btn" type="button">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide lucide-square-pen-icon lucide-square-pen">
                                                <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                                <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z" />
                                            </svg>
                                        </button>
                                        <button class="dashboard-btn field-save-btn hidden" type="button">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide lucide-check-icon lucide-check">
                                                <path d="M20 6 9 17l-5-5" />
                                            </svg>
                                        </button>
                                        <button class="dashboard-btn field-cancel-btn hidden" type="button">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide lucide-x-icon lucide-x">
                                                <path d="M18 6 6 18" />
                                                <path d="m6 6 12 12" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </td>
                            <td class="user-email"></td>
                            <td>
                                <div class="editable-field" data-field="phone">
                                    <span class="field-text user-phone-text"></span>
                                    <input class="content-inpute field-input user-phone-input hidden" type="tel" pattern="[0-9]{10}" inputmode="numeric" maxlength="10" minlength="10">
                                    <div class="field-actions">
                                        <button class="dashboard-btn field-edit-btn" type="button">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide lucide-square-pen-icon lucide-square-pen">
                                                <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                                <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z" />
                                            </svg>
                                        </button>
                                        <button class="dashboard-btn field-save-btn hidden" type="button">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide lucide-check-icon lucide-check">
                                                <path d="M20 6 9 17l-5-5" />
                                            </svg>
                                        </button>
                                        <button class="dashboard-btn field-cancel-btn hidden" type="button">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide lucide-x-icon lucide-x">
                                                <path d="M18 6 6 18" />
                                                <path d="m6 6 12 12" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <select class="content-inpute role-select dashboard-user-role">
                                    <option value="admin">Admin</option>
                                    <option value="user">User</option>
                                </select>
                            </td>
                            <td>
                                <button class="dashboard-btn delete-btn" type="button">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dashboard-btn-icon lucide-trash-icon lucide-trash">
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                                        <path d="M3 6h18" />
                                        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    </template>
                </div>
            </div>
        </div>
    </section>

    <div class="popup" id="delete-confirm-popup">
        <div class="popup-content">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="popup-icon">
                <path fill="#EF4444" d="M12 2L1 21h22L12 2zm1 15h-2v-2h2v2zm0-4h-2v-4h2v4z" />
            </svg>
            <h3 class="popup-title">Delete User</h3>
            <p class="popup-description">Are you sure you want to delete this user?</p>
            <div class="popup-action-buttons">
                <button class="btn secondary-btn" id="cancel-delete-btn" type="button">Cancel</button>
                <button class="btn popup-delete-btn" id="confirm-delete-btn" type="button">Delete</button>
            </div>
        </div>
    </div>

    <div class="popup" id="error-popup">
        <div class="popup-content">
            <h3 class="popup-title">Error</h3>
            <p class="popup-description error-description" id="error-popup-message"></p>
            <button type="button" id="error-popup-btn" class="btn primary-btn">OK</button>
        </div>
    </div>
    <!----- Custom Js ----->
    <script src="assets/js/script.js"></script>
</body>

</html>
