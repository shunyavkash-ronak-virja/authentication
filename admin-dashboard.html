<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="admin-dashboard-section">
        <div class="container lg-container">
            <div class="admin-dashboard-wrapper">
                <div class="dashboard-header">
                    <h1 class="dashboard-title">User Management</h1>
                    <button class="btn primary-btn dashboard-logout-btn" id="logout-btn">Logout</button>
                </div>

                <div class="dashboard-table-wrapper">
                    <table class="dashboard-user-table">
                        <thead class="dashboard-thead">
                            <tr class="dashboard-thead-row">
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th class="action-column">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="dashboard-table-body" id="user-table-body">
                        </tbody>
                    </table>
                    <template id="user-row-template">
                        <tr>
                            <td class="user-name"></td>
                            <td class="user-email"></td>
                            <td class="user-phone"></td>
                            <td>
                                <select class="content-inpute role-select dashboard-user-role">
                                    <option value="admin">Admin</option>
                                    <option value="user" selected>User</option>
                                </select>
                            </td>
                            <td>
                                <div class="dashboard-buttons-wrapper">
                                    <button class="delete-btn">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="delete-btn-icon lucide lucide-trash-icon lucide-trash">
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                                            <path d="M3 6h18" />
                                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </div>
            </div>
        </div>
    </section>

    <div class="success-popup" id="delete-confirm-popup">
        <div class="success-popup-content">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="success-popup-icon">
                <path fill="#EF4444" d="M12 2L1 21h22L12 2zm1 15h-2v-2h2v2zm0-4h-2v-4h2v4z" />
            </svg>
            <h3 class="success-popup-title">Delete User</h3>
            <p class="success-popup-description">Are you sure you want to delete this user?</p>
            <div class="popup-action-buttons">
                <button type="button" class="btn secondary-btn" id="cancel-delete-btn">Cancel</button>
                <button type="button" class="btn popup-delete-btn" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>
    <!----- Custom Js ----->
    <script src="assets/js/script.js"></script>
</body>

</html>
