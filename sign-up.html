<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="sign-up-section">
        <div class="container">
            <div class="section-main-wrapper">
                <h1 class="title">Create Account</h1>
                <p class="form-description">Create your account and get started with us today.</p>

                <form class="form-spacing sign-up-form" novalidate>
                    <div class="form-input-group">
                        <label class="text-capitalize sign-up-input-label" for="full-name">Full Name</label>
                        <input class="content-inpute" type="text" id="full-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-input-group">
                        <label class="text-capitalize sign-up-input-label" for="sign-up-email">Email Address</label>
                        <input class="content-inpute" type="email" id="sign-up-email" placeholder="name@company.com" required>
                    </div>
                    <div class="form-input-group">
                        <label class="text-capitalize sign-up-input-label" for="sign-up-number">Number</label>
                        <input class="content-inpute" type="number" id="sign-up-number" placeholder="+91 1234567890" maxlength="10" required>
                    </div>
                    <div class="form-input-group">
                        <label class="text-capitalize sign-up-input-label" for="sign-up-number">Select Your Role</label>
                        <select class="content-inpute nice-select role-select" name="" id="role-select" required>
                            <option value="">Chose Role</option>
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                    <div class="password-field-wrapper">
                        <div class="form-input-group">
                            <label class="text-capitalize sign-up-input-label" for="sign-up-password">Password</label>
                            <div class="password-input-wrapper">
                                <input class="content-inpute" type="password" id="sign-up-password" data-password-input placeholder="••••••••" required>
                                <div class="password-show-toggle" data-password-toggle>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-show-icon eye-open-icon icon-visibility lucide lucide-eye-icon lucide-eye">
                                        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-show-icon eye-close-icon lucide lucide lucide-eye-off-icon lucide-eye-off">
                                        <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
                                        <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                                        <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
                                        <path d="m2 2 20 20" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="password-rules-block">
                            <div class="password-rules-title-group">
                                <p class="password-rules-title">Password Strength</p>
                                <span class="password-rules-status">Weak</span>
                            </div>
                            <input class="password-rules-progress-bar" type="range" step="25" value="50"></input>
                            <div class="password-rules-item" data-rule="length">
                                <div class="password-rules-icon-group">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-icon-true icon-visibility lucide lucide-circle-check-icon lucide-circle-check">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="m9 12 2 2 4-4" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-false lucide lucide-circle-minus-icon lucide-circle-minus">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M8 12h8" />
                                    </svg>
                                </div>
                                <span>Minimum 8 characters</span>
                            </div>
                            <div class="password-rules-item" data-rule="uppercase">
                                <div class="password-rules-icon-group">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-icon-true icon-visibility lucide lucide-circle-check-icon lucide-circle-check">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="m9 12 2 2 4-4" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-false lucide lucide-circle-minus-icon lucide-circle-minus">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M8 12h8" />
                                    </svg>
                                </div>
                                <span>At least one uppercase letter</span>
                            </div>
                            <div class="password-rules-item" data-rule="number">
                                <div class="password-rules-icon-group">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-icon-true icon-visibility lucide lucide-circle-check-icon lucide-circle-check">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="m9 12 2 2 4-4" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-false lucide lucide-circle-minus-icon lucide-circle-minus">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M8 12h8" />
                                    </svg>
                                </div>
                                <span>At least one number</span>
                            </div>
                            <div class="password-rules-item" data-rule="special">
                                <div class="password-rules-icon-group">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-icon-true lucide icon-visibility lucide-circle-check-icon lucide-circle-check">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="m9 12 2 2 4-4" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-rules-icon password-rules-false lucide lucide-circle-minus-icon lucide-circle-minus">
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M8 12h8" />
                                    </svg>
                                </div>
                                <span>At least one special character</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn primary-btn" type="submit">Create Account</button>
                    <div class="align-center sign-in-text-wrapper">
                        <span class="font-vesper">Already have an account?</span>
                        <a href="sign-in.html" class="primary-link inline-flex">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!----- Custom Js ----->
    <script src="assets/js/script.js"></script>
</body>

</html>
