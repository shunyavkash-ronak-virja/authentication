<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <!----- Google Font ----->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!----- Custom Css ----->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="sign-up-section">
        <div class="container">
            <div class="section-main-wrapper">
                <h1 class="title">Create Account</h1>
                <p class="form-description">Create your account and get started with us today.</p>

                <form class="form-spacing sign-up-form">
                    <div class="sign-up-input-group">
                        <label class="sign-up-input-label" for="full-name">Full Name</label>
                        <input class="content-inpute" type="text" id="full-name" placeholder="John Doe" required>
                    </div>
                    <div class="sign-up-input-group">
                        <label class="sign-up-input-label" for="sign-up-email">Email Address</label>
                        <input class="content-inpute" type="email" id="sign-up-email" placeholder="name@company.com" required>
                    </div>
                    <div class="sign-up-input-group">
                        <label class="sign-up-input-label" for="sign-up-password">Password</label>
                        <input class="content-inpute" type="password" id="sign-up-password" placeholder="Enter password" required>
                    </div>
                    <button class="btn primary-btn" type="submit">Create Account</button>
                    <div class="align-center sign-in-text-wrapper">
                        <span class="font-vesper">Already have an account?</span>
                        <a href="sign-in.html" class="primary-link inline-flex">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
